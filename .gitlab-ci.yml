variables:
  HUGO_ENV: production
  THEME_URL: "github.com/gdr-sdl/theme"
  CI_PROJECT_DIR: "/builds/gdr-scilog/site"

default:
  before_script:
    - echo "Listing files:"
    - ls -la
    - hugo version
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - |
      if [ ! -f "hugo.toml" ] && [ ! -f "config.toml" ]; then
        echo "Error: No Hugo config file found"
        exit 1
      fi
    - hugo mod get -u $THEME_URL
    - hugo mod tidy
    - hugo mod vendor

# Use everywhere except on the default branch
test:
  script:
    - hugo --minify --config hugo.toml
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

# Run only on the default branch
pages:
  stage: deploy
  script:
    - hugo --minify --config hugo.toml
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH